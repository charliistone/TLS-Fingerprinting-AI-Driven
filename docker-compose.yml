services:
  tls-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tls_analyzer
    volumes:
      - .:/app
      - ./data:/app/data       # Persistent SQLite DB and PCAP captures
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PATH=/app/data/tls_fingerprint.db
      - CAPTURE_DIR=/app/data/captures
    network_mode: "host"
    privileged: true
    ports:
      - "8501:8501"
    command: >
      sh -c "python app/main.py --with-dashboard --capture-owner host"

volumes: {}